name: CI Pipeline

on:
push:
branches: ["main"]
pull_request:

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install dependencies
    run: |
      python -m pip install --upgrade pip
      pip install pyspark kafka-python pytest flake8

  - name: Lint code
    run: |
      echo "Running flake8..."
      flake8 . || echo "Lint warnings found (non-blocking)"

  - name: Run tests
    run: |
      if [ -d "tests" ]; then
        echo "Running pytest..."
        pytest tests/
      else
        echo "No tests directory found, skipping tests."
      fi

  - name: Validate docker-compose file
    run: |
      docker compose config

  - name: CI Success
    run: echo "Pipeline completed successfully "
```

