name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install pyspark kafka-python pytest

    - name: Lint code (non-blocking)
  run: |
    pip install flake8
    flake8 . || true


    - name: Run tests
      run: |
        pytest tests/ || echo "No tests yet"
